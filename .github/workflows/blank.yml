name: C Artifact Demo

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install GCC compiler
      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y gcc

      # 3. Compile C program
      - name: Compile program
        run: gcc add.c -o add

      # 4. Verify file exists (IMPORTANT)
      - name: List files
        run: ls -l

      # 5. Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: add
